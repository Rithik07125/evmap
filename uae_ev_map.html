<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>UAE EV Charger Map — ION + DEWA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4F9;--panel:#fff;--panel2:#F5F8FC;--line:#E2E8F0;--line2:#CBD5E1;
  --text:#0F172A;--muted:#64748B;--dim:#94A3B8;
  --green:#16A34A;--green-bg:#DCFCE7;--green-tc:#14532D;
  --amber:#D97706;--amber-bg:#FEF3C7;--amber-tc:#78350F;
  --red:#DC2626;--red-bg:#FEE2E2;
  --gray:#64748B;--gray-bg:#F1F5F9;--gray-tc:#475569;
  --ion:#059669;--ion-light:#D1FAE5;
  --dewa:#2563EB;--dewa-light:#DBEAFE;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;}
.app{display:flex;flex-direction:column;height:100vh;}
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:54px;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,0.07);flex-shrink:0;z-index:200;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#059669,#2563EB);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:15px;height:15px;}
.logo-name{font-size:14px;font-weight:700;}
.logo-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ion);background:var(--ion-light);padding:2px 6px;border-radius:4px;}
.divider{width:1px;height:20px;background:var(--line);flex-shrink:0;}
.ntog{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;border:1.5px solid var(--line2);background:var(--panel2);cursor:pointer;font-size:11px;font-weight:600;transition:all 0.15s;user-select:none;}
.ntog.on-ion{background:var(--ion-light);border-color:var(--ion);color:var(--green-tc);}
.ntog.on-dewa{background:var(--dewa-light);border-color:var(--dewa);color:#1e3a8a;}
.ntog-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);font-size:11px;color:var(--muted);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--dim);}
.pulse.live{background:var(--green);animation:blink 2s ease-in-out infinite;}
.pulse.fail{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sp{flex:1;}
.tg input{padding:6px 9px;border-radius:7px;border:1.5px solid var(--line2);background:var(--panel2);color:var(--text);font-size:10px;font-family:monospace;width:200px;}
.tg input:focus{outline:none;border-color:var(--ion);}
.tg input::placeholder{color:var(--dim);}
.tg{display:flex;align-items:center;gap:5px;}
.btn{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:7px;border:1.5px solid var(--line2);background:var(--panel);color:var(--text);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-live{background:var(--ion);border-color:var(--ion);color:white;}
.stats{display:flex;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;}
.stat{flex:1;padding:7px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--line);}
.stat:last-child{border-right:none;}
.si{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sn{font-size:16px;font-weight:700;line-height:1;}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-top:1px;}
.main{flex:1;display:flex;min-height:0;}
.sidebar{width:295px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;}
.ss{padding:9px 11px;border-bottom:1px solid var(--line);}
.sw{position:relative;}
.sw input{width:100%;padding:6px 9px 6px 28px;border-radius:8px;border:1.5px solid var(--line2);background:var(--panel2);color:var(--text);font-size:11px;font-family:inherit;}
.sw input:focus{outline:none;border-color:var(--ion);}
.sw input::placeholder{color:var(--dim);}
.si2{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--dim);}
.list{flex:1;overflow-y:auto;padding:5px;}
.list::-webkit-scrollbar{width:4px;}
.list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}
.shd{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:7px 7px 3px;display:flex;align-items:center;gap:5px;}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.card{padding:7px 9px;border-radius:8px;margin-bottom:2px;cursor:pointer;border:1.5px solid transparent;transition:all 0.1s;}
.card:hover{background:var(--panel2);border-color:var(--line);}
.card.ai{background:var(--ion-light);border-color:var(--ion);}
.card.ad{background:var(--dewa-light);border-color:var(--dewa);}
.ct{display:flex;align-items:flex-start;justify-content:space-between;gap:5px;}
.cn{font-size:11px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pill{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;text-transform:uppercase;flex-shrink:0;margin-top:1px;}
.cm{font-size:9px;color:var(--muted);margin-top:1px;}
.cdots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;}
.cdot{width:7px;height:7px;border-radius:50%;}
#map{flex:1;}
.leaflet-popup-content-wrapper{background:var(--panel);border-radius:10px;border:1px solid var(--line);box-shadow:0 4px 16px rgba(0,0,0,0.12);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-tip-container{display:none;}
.popup{min-width:210px;font-family:'Inter',sans-serif;}
.ph{padding:10px 12px 8px;border-bottom:1px solid var(--line);}
.ph h4{font-size:12px;font-weight:700;margin-bottom:2px;}
.ph .addr{font-size:9px;color:var(--muted);line-height:1.4;}
.ph .nt{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;margin-bottom:3px;text-transform:uppercase;}
.pb{padding:7px 12px;}
.pr{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid var(--line);}
.pr:last-child{border:none;}
.pl{color:var(--muted);}
.pv{font-weight:600;}
.mwrap{position:relative;width:30px;height:30px;}
.mpulse{position:absolute;inset:0;border-radius:50%;animation:mr 2s ease-out infinite;}
@keyframes mr{0%{transform:scale(0.6);opacity:0.7;}100%{transform:scale(2.2);opacity:0;}}
.mdot{position:absolute;inset:4px;border-radius:50%;border:2.5px solid white;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.mdot svg{width:10px;height:10px;}
.toast{position:fixed;bottom:16px;right:16px;background:var(--text);color:white;padding:8px 13px;border-radius:8px;font-size:11px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.25s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>

ate":"Available"},{"id":80,"state":"Available"},{"id":81,"state":"Available"}],"chargePoints":[{"title":"Charger 1","connectors":[{"readableId":"1","powerWt":50000,"state":"Available","typeDescription":"CCS2"},{"readableId":"2","powerWt":50000,"state":"Available","typeDescription":"CCS2"}]},{"title":"Charger 2","connectors":[{"readableId":"1","powerWt":50000,"state":"Available","typeDescription":"CCS2"},{"readableId":"2","powerWt":50000,"state":"Available","typeDescription":"CCS2"}]}]}];

let ionSites=ION_SEED,showIon=true,showDewa=true,activeId=null,activeNet=null,token='',rtimer=null,isLive=false;
const mIon={},mDewa={};
const lIon=L.layerGroup(),lDewa=L.layerGroup();
const map=L.map('map').setView([25.15,55.35],9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
lIon.addTo(map);lDewa.addTo(map);

const S={available:{c:'#16A34A',bg:'#DCFCE7',tc:'#14532D',l:'Available'},occupied:{c:'#D97706',bg:'#FEF3C7',tc:'#78350F',l:'In use'},partial:{c:'#D97706',bg:'#FEF3C7',tc:'#78350F',l:'Partial'},offline:{c:'#DC2626',bg:'#FEE2E2',tc:'#7F1D1D',l:'Offline'},coming:{c:'#94A3B8',bg:'#F1F5F9',tc:'#475569',l:'Coming soon'}};
function ist(s){if(s.activeConnectorsCount===0&&!s.onlineConnectorsStates.length)return'coming';const t=s.onlineConnectorsStates.map(c=>c.state);if(!t.length)return'offline';if(t.every(c=>c==='Available'))return'available';if(t.some(c=>c==='Occupied'||c==='Charging'))return'occupied';return'partial';}
function cc(st){return st==='Available'?'#16A34A':st==='Occupied'||st==='Charging'?'#D97706':'#CBD5E1';}
function pw(w){const k=w/1000;return k>=1?k+'kW':w+'W';}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function mkIcon(col,pulse){
  const p=pulse?`<div class="mpulse" style="background:${col}40"></div>`:'';
  return L.divIcon({className:'',html:`<div class="mwrap">${p}<div class="mdot" style="background:${col}"><svg viewBox="0 0 24 24" fill="white"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div></div>`,iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-15]});
}
function renderMarkers(){
  lIon.clearLayers();lDewa.clearLayers();
  Object.keys(mIon).forEach(k=>delete mIon[k]);
  Object.keys(mDewa).forEach(k=>delete mDewa[k]);
  if(showIon)ionSites.forEach(s=>{
    const sv=S[ist(s)];
    const m=L.marker([s.latitude,s.longitude],{icon:mkIcon(sv.c,ist(s)==='occupied'||ist(s)==='partial')});
    const maxP=Math.max(...s.chargePoints.flatMap(cp=>cp.connectors.map(c=>c.powerWt)));
    m.bindPopup(`<div class="popup"><div class="ph"><div class="nt" style="background:var(--ion-light);color:var(--green-tc)">ION Network</div><h4>${esc(s.title)}</h4><div class="addr">${esc(s.address)}</div></div><div class="pb"><div class="pr"><span class="pl">Status</span><span class="pv" style="color:${sv.c}">${sv.l}</span></div><div class="pr"><span class="pl">Max power</span><span class="pv">${pw(maxP)}</span></div><div class="pr"><span class="pl">Connectors</span><span class="pv">${s.activeConnectorsCount}/${s.connectorsCount}</span></div></div></div>`,{maxWidth:250});
    m.on('click',()=>setA(s.id,'ion'));m.addTo(lIon);mIon[s.id]=m;
  });
  if(showDewa)DEWA.forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:mkIcon('#2563EB',false)});
    m.bindPopup(`<div class="popup"><div class="ph"><div class="nt" style="background:var(--dewa-light);color:#1e3a8a">DEWA</div><h4>${esc(s.name)}</h4><div class="addr">${esc(s.address)}</div></div><div class="pb"><div class="pr"><span class="pl">Connectors</span><span class="pv">${s.connectors}</span></div><div class="pr"><span class="pl">Types</span><span class="pv" style="font-size:9px">${esc(s.types)}</span></div><div class="pr"><span class="pl">ID</span><span class="pv" style="font-size:9px">${esc(s.hubelean)}</span></div></div></div>`,{maxWidth:250});
    m.on('click',()=>setA(s.id,'dewa'));m.addTo(lDewa);mDewa[s.id]=m;
  });
  updateStats();renderList();
}
function updateStats(){
  const av=showIon?ionSites.filter(s=>ist(s)==='available').length:0;
  const ic=showIon?ionSites.reduce((a,s)=>a+s.connectorsCount,0):0;
  const dc=showDewa?DEWA.reduce((a,s)=>a+s.connectors,0):0;
  document.getElementById('s1').textContent=showIon?ionSites.length:0;
  document.getElementById('s2').textContent=showDewa?DEWA.length:0;
  document.getElementById('s3').textContent=(showIon?ionSites.length:0)+(showDewa?DEWA.length:0);
  document.getElementById('s4').textContent=showIon?av:'-';
  document.getElementById('s5').textContent=ic+dc;
}
function renderList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const list=document.getElementById('list');list.innerHTML='';
  if(showIon){
    const f=ionSites.filter(s=>!q||[s.title,s.address].join(' ').toLowerCase().includes(q));
    if(f.length){
      const hd=document.createElement('div');hd.className='shd';
      hd.innerHTML=`<div class="sd" style="background:var(--ion)"></div>ION Network (${f.length})`;list.appendChild(hd);
      f.forEach(s=>{
        const sv=S[ist(s)];const div=document.createElement('div');
        div.className='card'+(s.id===activeId&&activeNet==='ion'?' ai':'');
        const dots=s.onlineConnectorsStates.map(c=>`<div class="cdot" style="background:${cc(c.state)}"></div>`).join('');
        div.innerHTML=`<div class="ct"><div class="cn">${esc(s.title)}</div><div class="pill" style="background:${sv.bg};color:${sv.tc}">${sv.l}</div></div><div class="cm">${s.activeConnectorsCount}/${s.connectorsCount} connectors</div>${dots?`<div class="cdots">${dots}</div>`:''}`;
        div.onclick=()=>{setA(s.id,'ion');map.flyTo([s.latitude,s.longitude],14,{duration:0.5});mIon[s.id]&&mIon[s.id].openPopup();};
        list.appendChild(div);
      });
    }
  }
  if(showDewa){
    const f=DEWA.filter(s=>!q||[s.name,s.address].join(' ').toLowerCase().includes(q));
    if(f.length){
      const hd=document.createElement('div');hd.className='shd';
      hd.innerHTML=`<div class="sd" style="background:var(--dewa)"></div>DEWA (${f.length})`;list.appendChild(hd);
      f.slice(0,80).forEach(s=>{
        const div=document.createElement('div');
        div.className='card'+(s.id===activeId&&activeNet==='dewa'?' ad':'');
        div.innerHTML=`<div class="ct"><div class="cn">${esc(s.name)}</div><div class="pill" style="background:var(--dewa-light);color:#1e3a8a">${s.connectors}pt</div></div><div class="cm">${esc(s.address.split(',').slice(-2).join(',').trim())}</div>`;
        div.onclick=()=>{setA(s.id,'dewa');map.flyTo([s.lat,s.lng],15,{duration:0.5});mDewa[s.id]&&mDewa[s.id].openPopup();};
        list.appendChild(div);
      });
      if(f.length>80){const m=document.createElement('div');m.className='shd';m.textContent=`+ ${f.length-80} more — refine search`;list.appendChild(m);}
    }
  }
}
function setA(id,net){activeId=id;activeNet=net;renderList();}
function toggleNet(net){
  if(net==='ion'){showIon=!showIon;document.getElementById('tog-ion').className='ntog'+(showIon?' on-ion':'');}
  else{showDewa=!showDewa;document.getElementById('tog-dewa').className='ntog'+(showDewa?' on-dewa':'');}
  renderMarkers();
}
async function fetchIon(){
  if(!token)return;
  try{
    const r=await fetch('http://localhost:3001',{headers:{'x-device-fingerprint':token}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(Array.isArray(d)&&d.length){ionSites=d;renderMarkers();setLive(true);toast('ION updated');}
  }catch(e){setLive(false);toast('ION failed: '+e.message);}
}
function setLive(ok){isLive=ok;document.getElementById('lpulse').className='pulse'+(ok?' live':' fail');document.getElementById('llabel').textContent=ok?'ION live':'ION failed';}
function goLive(){token=document.getElementById('tok').value.trim();if(!token){toast('Paste fingerprint first');return;}document.getElementById('llabel').textContent='Connecting…';if(rtimer)clearInterval(rtimer);fetchIon();rtimer=setInterval(fetchIon,30000);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
renderMarkers();
</script></body></html>
