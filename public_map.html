<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>UAE EV Charger Map — ION + DEWA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4F9;--panel:#fff;--panel2:#F5F8FC;--line:#E2E8F0;--line2:#CBD5E1;
  --text:#0F172A;--muted:#64748B;--dim:#94A3B8;
  --green:#16A34A;--green-bg:#DCFCE7;--green-tc:#14532D;
  --amber:#D97706;--amber-bg:#FEF3C7;--amber-tc:#78350F;
  --red:#DC2626;--red-bg:#FEE2E2;
  --gray:#64748B;--gray-bg:#F1F5F9;--gray-tc:#475569;
  --ion:#059669;--ion-light:#D1FAE5;
  --dewa:#2563EB;--dewa-light:#DBEAFE;
  --uaev:#DC2626;--uaev-light:#FEE2E2;
  --e2go:#7C3AED;--e2go-light:#EDE9FE;
  --zyn:#0EA5E9;--zyn-light:#E0F2FE;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;}
.app{display:flex;flex-direction:column;height:100vh;}
.topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:54px;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,0.07);flex-shrink:0;z-index:200;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#059669,#2563EB);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:15px;height:15px;}
.logo-name{font-size:14px;font-weight:700;}
.logo-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ion);background:var(--ion-light);padding:2px 6px;border-radius:4px;}
.divider{width:1px;height:20px;background:var(--line);flex-shrink:0;}
.ntog{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;border:1.5px solid var(--line2);background:var(--panel2);cursor:pointer;font-size:11px;font-weight:600;transition:all 0.15s;user-select:none;}
.ntog.on-ion{background:var(--ion-light);border-color:var(--ion);color:var(--green-tc);}
.ntog.on-dewa{background:var(--dewa-light);border-color:var(--dewa);color:#1e3a8a;}
.ntog.on-uaev{background:var(--uaev-light);border-color:var(--uaev);color:#7F1D1D;}
.ntog.on-e2go{background:var(--e2go-light);border-color:var(--e2go);color:#4C1D95;}
.ntog.on-zyn{background:var(--zyn-light);border-color:var(--zyn);color:#0C4A6E;}
.ntog-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);font-size:11px;color:var(--muted);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--dim);}
.pulse.live{background:var(--green);animation:blink 2s ease-in-out infinite;}
.pulse.fail{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sp{flex:1;}
.tg input{padding:6px 9px;border-radius:7px;border:1.5px solid var(--line2);background:var(--panel2);color:var(--text);font-size:10px;font-family:monospace;width:200px;}
.tg input:focus{outline:none;border-color:var(--ion);}
.tg input::placeholder{color:var(--dim);}
.tg{display:flex;align-items:center;gap:5px;}
.btn{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:7px;border:1.5px solid var(--line2);background:var(--panel);color:var(--text);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-live{background:var(--ion);border-color:var(--ion);color:white;}
.stats{display:flex;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;}
.stat{flex:1;padding:7px 12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--line);}
.stat:last-child{border-right:none;}
.si{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sn{font-size:16px;font-weight:700;line-height:1;}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-top:1px;}
.main{flex:1;display:flex;min-height:0;position:relative;}
.sidebar{width:295px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;transition:width 0.2s ease,min-width 0.2s ease;overflow:hidden;}
.sidebar.collapsed{width:0;min-width:0;border-right:none;}
.sidebar-toggle{position:absolute;top:10px;left:295px;z-index:250;width:20px;height:40px;background:var(--panel);border:1px solid var(--line);border-left:none;border-radius:0 8px 8px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:2px 0 6px rgba(0,0,0,0.06);transition:left 0.2s ease;color:var(--muted);}
.sidebar-toggle:hover{color:var(--text);background:var(--panel2);}
.sidebar-toggle.collapsed{left:0;border-radius:0 8px 8px 0;}
.sidebar-toggle svg{width:12px;height:12px;transition:transform 0.2s ease;}
.sidebar-toggle.collapsed svg{transform:rotate(180deg);}
.ss{padding:9px 11px;border-bottom:1px solid var(--line);}
.sw{position:relative;}
.sw input{width:100%;padding:6px 9px 6px 28px;border-radius:8px;border:1.5px solid var(--line2);background:var(--panel2);color:var(--text);font-size:11px;font-family:inherit;}
.sw input:focus{outline:none;border-color:var(--ion);}
.sw input::placeholder{color:var(--dim);}
.si2{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;color:var(--dim);}
.list{flex:1;overflow-y:auto;padding:5px;}
.list::-webkit-scrollbar{width:4px;}
.list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}
.shd{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:7px 7px 3px;display:flex;align-items:center;gap:5px;}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.card{padding:7px 9px;border-radius:8px;margin-bottom:2px;cursor:pointer;border:1.5px solid transparent;transition:all 0.1s;}
.card:hover{background:var(--panel2);border-color:var(--line);}
.card.ai{background:var(--ion-light);border-color:var(--ion);}
.card.ad{background:var(--dewa-light);border-color:var(--dewa);}
.card.au{background:var(--uaev-light);border-color:var(--uaev);}
.card.ae2{background:var(--e2go-light);border-color:var(--e2go);}
.card.azyn{background:var(--zyn-light);border-color:var(--zyn);}
.ct{display:flex;align-items:flex-start;justify-content:space-between;gap:5px;}
.cn{font-size:11px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pill{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;text-transform:uppercase;flex-shrink:0;margin-top:1px;}
.cm{font-size:9px;color:var(--muted);margin-top:1px;}
.cdots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;}
.cdot{width:7px;height:7px;border-radius:50%;}
#map{flex:1;}
.leaflet-popup-content-wrapper{background:var(--panel);border-radius:10px;border:1px solid var(--line);box-shadow:0 4px 16px rgba(0,0,0,0.12);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-tip-container{display:none;}
.popup{min-width:210px;font-family:'Inter',sans-serif;}
.ph{padding:10px 12px 8px;border-bottom:1px solid var(--line);}
.ph h4{font-size:12px;font-weight:700;margin-bottom:2px;}
.ph .addr{font-size:9px;color:var(--muted);line-height:1.4;}
.ph .nt{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;margin-bottom:3px;text-transform:uppercase;}
.pb{padding:7px 12px;}
.pr{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid var(--line);}
.pr:last-child{border:none;}
.pl{color:var(--muted);}
.pv{font-weight:600;}
.mwrap{position:relative;width:30px;height:30px;}
.mpulse{position:absolute;inset:0;border-radius:50%;animation:mr 2s ease-out infinite;}
@keyframes mr{0%{transform:scale(0.6);opacity:0.7;}100%{transform:scale(2.2);opacity:0;}}
.mdot{position:absolute;inset:4px;border-radius:50%;border:2.5px solid white;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.mdot svg{width:10px;height:10px;}
.toast{position:fixed;bottom:16px;right:16px;background:var(--text);color:white;padding:8px 13px;border-radius:8px;font-size:11px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.25s;pointer-events:none;}
.toast.show{opacity:1;}

/* Location search */
.loc-search-wrap{position:absolute;top:14px;right:14px;z-index:1000;width:300px;}
.loc-search-box{display:flex;align-items:center;gap:6px;background:white;border-radius:10px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.15);border:1.5px solid var(--line);}
.loc-search-box input{flex:1;border:none;outline:none;font-size:12px;font-family:'Inter',sans-serif;color:var(--text);}
.loc-search-box input::placeholder{color:var(--dim);}
.loc-btn{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:var(--muted);}
.loc-btn:hover{color:var(--ion);}
.loc-results{background:white;border-radius:10px;margin-top:6px;box-shadow:0 2px 12px rgba(0,0,0,0.15);border:1px solid var(--line);overflow:hidden;display:none;}
.loc-result-item{padding:8px 12px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--line);transition:background 0.1s;}
.loc-result-item:last-child{border-bottom:none;}
.loc-result-item:hover{background:var(--panel2);}
.loc-result-name{font-weight:600;color:var(--text);}
.loc-result-addr{color:var(--muted);margin-top:1px;font-size:10px;}
.nearest-panel{background:white;border-radius:10px;margin-top:6px;box-shadow:0 2px 12px rgba(0,0,0,0.15);border:1px solid var(--line);overflow:hidden;display:none;max-height:320px;overflow-y:auto;}
.nearest-panel::-webkit-scrollbar{width:4px;}
.nearest-panel::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}
.nearest-hd{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);background:var(--panel2);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.nearest-hd button{background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);font-family:inherit;}
.nearest-hd button:hover{color:var(--red);}
.nearest-item{padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.1s;}
.nearest-item:last-child{border-bottom:none;}
.nearest-item:hover{background:var(--panel2);}
.ni-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.ni-name{font-size:11px;font-weight:600;color:var(--text);}
.ni-dist{font-size:10px;font-weight:700;color:var(--ion);flex-shrink:0;}
.ni-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
.ni-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.loc-spinner{text-align:center;padding:12px;font-size:11px;color:var(--muted);}
.user-marker{width:16px;height:16px;border-radius:50%;background:#2563EB;border:3px solid white;box-shadow:0 2px 8px rgba(37,99,235,0.5);}

.updates-widget{position:fixed;bottom:16px;right:16px;z-index:400;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 3px 14px rgba(0,0,0,0.14);width:230px;overflow:hidden;}
.updates-header{display:flex;align-items:center;gap:7px;padding:10px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;}
.updates-widget.has-updates .updates-header{color:var(--green-tc);background:var(--green-bg);}
.updates-header .ut-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.updates-widget.has-updates .updates-header .ut-dot{background:var(--green);}
.updates-header .ut-text{flex:1;}
.updates-header .ut-chevron{width:11px;height:11px;flex-shrink:0;transition:transform 0.2s ease;}
.updates-widget.expanded .updates-header .ut-chevron{transform:rotate(180deg);}
.updates-body{max-height:0;overflow:hidden;transition:max-height 0.2s ease;border-top:1px solid transparent;}
.updates-widget.expanded .updates-body{max-height:260px;overflow-y:auto;border-top:1px solid var(--line);}
.updates-body-inner{padding:8px 12px;}
.ub-empty{font-size:11.5px;color:var(--dim);padding:6px 0;text-align:center;}
.ub-op-group{margin-bottom:8px;}
.ub-op-group:last-child{margin-bottom:0;}
.ub-op-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--dim);margin-bottom:3px;}
.ub-station{font-size:11.5px;padding:4px 0;border-bottom:1px solid var(--panel2);display:flex;align-items:center;gap:6px;}
.ub-station:last-child{border-bottom:none;}
.ub-station .ub-plus{color:var(--green);font-weight:700;flex-shrink:0;}
.ub-station .ub-minus{color:var(--red);font-weight:700;flex-shrink:0;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="white"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div>
      <div style="display:flex;align-items:center;gap:5px"><span class="logo-name">UAE EV Map</span><span class="logo-badge">Live</span></div>
    </div>
    <div class="divider"></div>
    <div class="ntog on-ion" id="tog-ion" onclick="toggleNet('ion')"><div class="ntog-dot" style="background:var(--ion)"></div>ION</div>
    <div class="ntog on-dewa" id="tog-dewa" onclick="toggleNet('dewa')"><div class="ntog-dot" style="background:var(--dewa)"></div>DEWA</div>
    <div class="ntog on-uaev" id="tog-uaev" onclick="toggleNet('uaev')"><div class="ntog-dot" style="background:var(--uaev)"></div>UAEV</div>
    <div class="ntog on-e2go" id="tog-e2go" onclick="toggleNet('e2go')"><div class="ntog-dot" style="background:var(--e2go)"></div>E2GO</div>
    <div class="ntog on-zyn" id="tog-zyn" onclick="toggleNet('zyn')"><div class="ntog-dot" style="background:var(--zyn)"></div>Zynetic</div>
    <div class="divider"></div>
    <div class="live-pill"><div class="pulse" id="lpulse"></div><span id="llabel">Offline</span></div>
    <div class="sp"></div>
    <div class="tg">
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="si" style="background:var(--ion-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ion)" stroke-width="2.5"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div><div><div class="sn" id="s1">12</div><div class="sl">ION sites</div></div></div>
    <div class="stat"><div class="si" style="background:var(--dewa-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--dewa)" stroke-width="2.5"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div><div><div class="sn" id="s2">335</div><div class="sl">DEWA sites</div></div></div>
    <div class="stat"><div class="si" style="background:var(--uaev-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--uaev)" stroke-width="2.5"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div><div><div class="sn" id="s6">78</div><div class="sl">UAEV sites</div></div></div>
    <div class="stat"><div class="si" style="background:var(--e2go-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--e2go)" stroke-width="2.5"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div><div><div class="sn" id="s7">10</div><div class="sl">E2GO sites</div></div></div>
    <div class="stat"><div class="si" style="background:var(--zyn-light)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--zyn)" stroke-width="2.5"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div><div><div class="sn" id="s8">23</div><div class="sl">Zynetic sites</div></div></div>
    <div class="stat"><div class="si" style="background:var(--green-bg)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="sn" id="s3">347</div><div class="sl">Total</div></div></div>
    <div class="stat"><div class="si" style="background:var(--green-bg)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg></div><div><div class="sn" id="s4">-</div><div class="sl">ION available</div></div></div>
    <div class="stat"><div class="si" style="background:#EDE9FE"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg></div><div><div class="sn" id="s5">-</div><div class="sl">Connectors</div></div></div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="ss"><div class="sw">
        <svg class="si2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" placeholder="Search all chargers…" oninput="renderList()"/>
      </div></div>
      <div class="list" id="list"></div>
    </div>
    <div class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div id="map"></div>

    <div class="loc-search-wrap" id="loc-search-wrap">
      <div class="loc-search-box">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--dim)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="loc-input" type="text" placeholder="Search location for nearest chargers…" />
        <button class="loc-btn" id="loc-clear" style="display:none" onclick="clearLocSearch()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <button class="loc-btn" onclick="locSearch()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        </button>
      </div>
      <div class="loc-results" id="loc-results"></div>
      <div class="nearest-panel" id="nearest-panel"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="updates-widget" id="updates-widget">
  <div class="updates-header" onclick="toggleUpdatesPanel()">
    <span class="ut-dot"></span>
    <span class="ut-text" id="updates-tab-text">Checking for updates…</span>
    <svg class="ut-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
  </div>
  <div class="updates-body" id="updates-body">
    <div class="updates-body-inner" id="updates-body-inner"></div>
  </div>

function ist(s){if(s.activeConnectorsCount===0&&!s.onlineConnectorsStates.length)return'coming';const t=s.onlineConnectorsStates.map(c=>c.state);if(!t.length)return'offline';if(t.every(c=>c==='Available'))return'available';if(t.some(c=>c==='Occupied'||c==='Charging'))return'occupied';return'partial';}

function renderMarkers(){

async function fetchE2goLive(){try{const r=await fetch('/e2go');if(!r.ok)return false;const d=await r.json();if(d.locations&&d.locations.length){e2goSites=d.locations.map(l=>({id:l.id,name:l.name.replace(/^[0-9]+ [-–] ?/,'').replace(/^[0-9]+-/,''),lat:l.coordinates.lat,lng:l.coordinates.long,chargers:l.chargers.map(c=>({name:c.chargerName,available:c.availableCount,total:c.totalCount}))}));document.getElementById('s7').textContent=e2goSites.length;return true;}return false;}catch(e){return false;}}
async function fetchZynLive(){
  try{
    const r=await fetch('/zynetic');
    if(!r.ok)return false;
    const d=await r.json();
    if(d.locations&&d.locations.length){
      zynSites=d.locations.map(l=>({
        id:l.locationId,
        name:l.location.name,
        address:l.location.address,
        lat:parseFloat(l.location.latitude),
        lng:parseFloat(l.location.longitude),
        available:l.availableConnectorCount,
        total:l.connectorCount,
        access:l.accessType
      }));
      document.getElementById('s8').textContent=zynSites.length;
      return true;
    }
    return false;
  }catch(e){return false;}
}
async function fetchIon(){
  try{
    const r=await fetch('/ion');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(Array.isArray(d)&&d.length){ionSites=d;return true;}
    return false;
  }catch(e){return false;}
}
async function fetchUaevLive(){
  try{
    const r=await fetch('/uaev');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(Array.isArray(d)&&d.length){
      // merge live evse data into existing UAEV array (keep names/addresses, update status)
      d.forEach(live=>{
        const target=UAEV.find(u=>u.id===live.id);
        if(target){
          const evses=[];
          (live.zones||[]).forEach(z=>(z.evses||[]).forEach(e=>{
            evses.push({id:e.identifier||e.id,status:e.status||'unknown',maxPower:e.maxPower||0,connectorType:(e.connectors&&e.connectors[0]&&e.connectors[0].name)||'Unknown',soc:e.socPercent||null});
          }));
          if(evses.length) target.evses=evses;
        }
      });
      return true;
    }
    return false;
  }catch(e){return false;}
}

}

const OP_LABELS={ion:'ION',uaev:'UAEV',e2go:'E2GO',zynetic:'Zynetic',dewa:'DEWA'};
function toggleUpdatesPanel(){
  document.getElementById('updates-widget').classList.toggle('expanded');

async function checkUpdates(){
  const widget=document.getElementById('updates-widget');
  const text=document.getElementById('updates-tab-text');
  const inner=document.getElementById('updates-body-inner');
  try{
    const r=await fetch('/updates');
    if(!r.ok){text.textContent='Updates unavailable';widget.classList.remove('has-updates');inner.innerHTML='<div class="ub-empty">Could not reach the updates endpoint.</div>';return;}
    const d=await r.json();
    if(d.error){
      text.textContent='Not enough history yet';
      widget.classList.remove('has-updates');
      inner.innerHTML='<div class="ub-empty">Need at least two days of snapshots before comparisons are possible. Check back tomorrow.</div>';
      return;
    }
    const added=d.totalAdded||0, removed=d.totalRemoved||0;
    if(added===0&&removed===0){
      text.textContent='No new updates';
      widget.classList.remove('has-updates');
      inner.innerHTML=`<div class="ub-empty">No new updates since ${d.from}.</div>`;
      return;
    }
    const parts=[];
    if(added>0)parts.push(`${added} added`);
    if(removed>0)parts.push(`${removed} removed`);
    text.textContent=parts.join(' · ');
    widget.classList.add('has-updates');
    let html='';
    Object.keys(d.operators||{}).forEach(op=>{
      const g=d.operators[op];
      if(!g||(g.added.length===0&&g.removed.length===0))return;
      html+=`<div class="ub-op-group"><div class="ub-op-label">${OP_LABELS[op]||op}</div>`;
      g.added.forEach(s=>{html+=`<div class="ub-station"><span class="ub-plus">+</span><span>${s.name||('Station '+s.id)}</span></div>`;});
      g.removed.forEach(s=>{html+=`<div class="ub-station"><span class="ub-minus">−</span><span>${s.name||('Station '+s.id)}</span></div>`;});
      html+=`</div>`;
    });
    inner.innerHTML=html||'<div class="ub-empty">No new updates.</div>';
  }catch(e){
    text.textContent='Updates unavailable';
    widget.classList.remove('has-updates');
    inner.innerHTML='<div class="ub-empty">Something went wrong checking for updates.</div>';
  }
}

async function geocodeSuggest(q) {

    if(!data.length){ box.style.display='none'; return; }

      <div class="loc-result-item" onclick="selectLocation(${r.lat},${r.lon},'${esc(r.display_name.split(',').slice(0,2).join(','))}')">

async function locSearch() {
  const q = document.getElementById('loc-input').value.trim();
  if(!q) return;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' UAE')}&format=json&limit=1&countrycodes=ae`);

}

  if(showDewa) DEWA.forEach(s=>{const d=haversine(lat,lng,s.lat,s.lng);all.push({d,name:s.name,addr:s.address,lat:s.lat,lng:s.lng,net:'dewa',id:s.id,status:'dewa'});});
  if(showUaev) UAEV.forEach(s=>{const d=haversine(lat,lng,s.lat,s.lng);const avail=s.evses.filter(e=>e.status==='available').length;const total2=s.evses.length;all.push({d,name:s.name,addr:s.address,lat:s.lat,lng:s.lng,net:'uaev',id:s.id,status:avail===total2?'available':avail>0?'partial':'offline'});});
  if(showZyn) zynSites.forEach(s=>{const d=haversine(lat,lng,s.lat,s.lng);all.push({d,name:s.name,addr:s.address,lat:s.lat,lng:s.lng,net:'zyn',id:s.id,status:s.available===s.total?'available':s.available>0?'partial':'offline'});});
  if(showE2go) e2goSites.forEach(s=>{const d=haversine(lat,lng,s.lat,s.lng);const avail=s.chargers.reduce((a,c)=>a+c.available,0);const total=s.chargers.reduce((a,c)=>a+c.total,0);all.push({d,name:s.name,addr:'ADNOC E2GO',lat:s.lat,lng:s.lng,net:'e2go',id:s.id,status:avail===total?'available':avail>0?'partial':'offline'});});

  all.sort((a,b)=>a.d-b.d);
  const nearest = all.slice(0,15);

  // Draw radius circle to furthest of top 5
  const r5 = nearest[4] ? nearest[4].d : 5000;
  radiusCircle = L.circle([lat,lng],{radius:Math.max(r5,1000),color:'#2563EB',fillColor:'#2563EB',fillOpacity:0.05,weight:1.5,dashArray:'6'}).addTo(map);

  map.flyTo([lat,lng], 13, {duration:0.7});
  showNearestPanel(nearest, name);
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}

const NET_COLORS={'ion':'#64748B','dewa':'#64748B','uaev':'#64748B','e2go':'#64748B','zyn':'#0EA5E9'};
const NET_LABELS={'ion':'ION','dewa':'DEWA','uaev':'UAEV','e2go':'E2GO','zyn':'Zynetic'};
const STATUS_COL={'available':'#16A34A','partial':'#F97316','occupied':'#F97316','dewa':'#16A34A','coming':'#94A3B8','offline':'#94A3B8'};

function showNearestPanel(nearest, locName) {
  const panel = document.getElementById('nearest-panel');
  panel.innerHTML = `<div class="nearest-hd"><span>Nearest chargers to ${esc(locName)}</span><button onclick="clearLocSearch()">✕ Clear</button></div>` +
    nearest.map(s=>`
      <div class="nearest-item" onclick="flyToCharger(${s.lat},${s.lng},'${s.net}',${s.id})">
        <div class="ni-top">
          <div class="ni-name">${esc(s.name)}</div>
          <div class="ni-dist">${fmtDist(s.d)}</div>
        </div>
        <div class="ni-meta">
          <div class="ni-dot" style="background:${NET_COLORS[s.net]}"></div>
          <span style="color:${NET_COLORS[s.net]};font-weight:600">${NET_LABELS[s.net]}</span>
          <span>·</span>
          <span style="color:${STATUS_COL[s.status]||'#94A3B8'}">${s.status}</span>
        </div>
      </div>`).join('');
  panel.style.display='block';
}

function flyToCharger(lat,lng,net,id){
  map.flyTo([lat,lng],16,{duration:0.5});
  const m = net==='ion'?mIon[id]:net==='dewa'?mDewa[id]:net==='uaev'?mUaev[id]:mE2go[id];
  if(m) setTimeout(()=>m.openPopup(),600);
}

function clearLocSearch(){
  document.getElementById('loc-input').value='';
  document.getElementById('loc-clear').style.display='none';
  document.getElementById('loc-results').style.display='none';
  document.getElementById('nearest-panel').style.display='none';
  if(userMarker){map.removeLayer(userMarker);userMarker=null;}
  if(radiusCircle){map.removeLayer(radiusCircle);radiusCircle=null;}
}

function ionStatus(s){
  if(s.activeConnectorsCount===0&&!s.onlineConnectorsStates.length)return'coming';
  const st=s.onlineConnectorsStates.map(c=>c.state);
  if(!st.length)return'offline';
  if(st.every(c=>c==='Available'))return'available';
  if(st.some(c=>c==='Occupied'||c==='Charging'))return'occupied';
  return'partial';
}

</script></body></html>
